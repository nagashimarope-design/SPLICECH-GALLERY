<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLICECH-GALLERY</title>
    <style>
        /* サイト全体のベース設定 */
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 動画と広告が同列に並ぶグリッド */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
            align-items: stretch; /* 広告と動画のカードの高さを揃える */
        }

        /* 動画カード */
        .video-card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 動画を16:9の比率にする記述 */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 比率 */
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 広告カードの見た目を動画に馴染ませる */
        .video-card.ad-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px; /* 広告が空欄の時も形を維持 */
        }

        .section-title {
            color: #ffcc00;
            font-size: 1.5rem;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="video-gallery-section">
        <h2 class="section-title">◆ ROPE WORK ARCHIVES</h2>
        
        <div class="video-grid">
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/XXXXX_EYE" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-card ad-card">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" 
                     data-ad-slot="XXXXXXXXXX"               
                     data-ad-format="fluid"                  
                     data-ad-layout-key="-fb+5w+4e-db+86"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/XXXXX_BACK" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/XXXXX_ADV" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
