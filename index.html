<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLICECH-GALLERY</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-pub-7913939428080109" crossorigin="anonymous"></script>

    <style>
        /* 全体のシックなデザイン */
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 【バグ修正済み】LAUNCH CHANNEL ボタンのスタイル */
        .launch-btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ffcc00;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            margin: 40px 0;
            transition: background 0.3s;
        }
        .launch-btn:hover {
            background-color: #e6b800;
        }

        /* 動画と広告が同列に並ぶグリッド */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            align-items: stretch;
        }

        .video-card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* 広告カードを動画に馴染ませる設定 */
        .video-card.ad-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        /* ページ最下部の広告用エリア（横長バナーなどに対応） */
        .bottom-ad-area {
            width: 100%;
            max-width: 1200px;
            margin: 50px 0 20px 0;
            text-align: center;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        .section-title {
            color: #ffcc00;
            font-size: 1.5rem;
            align-self: flex-start;
            max-width: 1200px;
            width: 100%;
            margin: 40px auto 10px auto;
        }

        .ad-label {
            color: #444;
            font-size: 10px;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <a href="https://youtube.com/@ch-splice" class="launch-btn" target="_blank">LAUNCH CHANNEL</a>

    <h2 class="section-title">◆ ROPE WORK ARCHIVES</h2>
    <div class="video-grid">
        
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/XXXXX_EYE" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="video-card ad-card">
            <span class="ad-label">SPONSORED LINK</span>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-pub-7913939428080109" 
                 data-ad-slot="pub-7913939428080109"               
                 data-ad-format="fluid"                  
                 data-ad-layout-key="-fb+5w+4e-db+86"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/XXXXX_BACK" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="video-card ad-card">
            <span class="ad-label">SPONSORED LINK</span>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-pub-7913939428080109" 
                 data-ad-slot="pub-7913939428080109"               
                 data-ad-format="fluid"                  
                 data-ad-layout-key="-fb+5w+4e-db+86"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/XXXXX_ADV" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

    </div>

    <div class="bottom-ad-area">
        <span class="ad-label">SPONSORED LINK</span>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-pub-7913939428080109"
             data-ad-slot="pub-7913939428080109"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

</body>
</html>
