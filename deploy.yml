name: Deploy Homepage

on:
  push:
    branches:
      - main  # ⚠️もしGitHubのメインの枝名が「master」の場合はここを master に書き換えます

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: コードをダウンロード
        uses: actions/checkout@v4

      - name: アドセンスIDとスロットIDを本物に自動置き換え
        run: |
          # index.html の中のダミー文字列を、GitHubの金庫（Secrets）に隠した本物のIDに置き換えます
          sed -i 's/pub-XXXXXXXXXXXXXXXX/'"${{ secrets.AD_CLIENT_ID }}"'/g' index.html
          sed -i 's/9999999999/'"${{ secrets.AD_SLOT_ID }}"'/g' index.html

      - name: GitHub Pagesへ公開する準備
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./